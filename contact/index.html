<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="contact-box">
            <h1>📧 Contact Us</h1>
            <p class="subtitle">Send us a message and we'll get back to you soon!</p>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    <span class="error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">📧 Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="subject">📋 Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Message subject" required>
                    <span class="error" id="subjectError"></span>
                </div>

                <div class="form-group">
                    <label for="message">💬 Message</label>
                    <textarea id="message" name="message" placeholder="Write your message here..." rows="6" required></textarea>
                    <span class="error" id="messageError"></span>
                </div>

                <div class="loader" id="loader">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Send Message</button>

                <div class="alert alert-success" id="successAlert">
                    ✅ Message sent successfully! Thank you for contacting us.
                </div>
                <div class="alert alert-error" id="errorAlert">
                    ❌ Error sending message. Please try again.
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
