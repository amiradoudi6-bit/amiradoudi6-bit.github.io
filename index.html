<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram API Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        form { display: flex; flex-direction: column; }
        input, button { padding: 10px; margin: 5px 0; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <form id="telegramForm">
            <input type="text" id="username" name="username" placeholder="Your Username" required>
            <input type="email" id="email" name="email" placeholder="Your Email" required>
            <button type="submit">Send</button>
        </form>
    </div>
    <script>
        document.getElementById('telegramForm').onsubmit = async function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            
            try {
                const response = await fetch(`https://api.telegram.org/botYOUR_SECURE_TOKEN/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: 'YOUR_CHAT_ID', text: `Username: ${username}, Email: ${email}` })
                });
                if (response.ok) {
                    alert('Message sent!');
                } else {
                    alert('Error while sending message. Please try again.');
                }
            } catch (error) {
                alert('An error occurred: ' + error.message);
            }
        };
    </script>
</body>
</html>
