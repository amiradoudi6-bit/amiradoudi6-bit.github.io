<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الكاميرا</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #1a1a1a; color: white; }
        .container { text-align: center; padding: 20px; }
        video { width: 90%; max-width: 500px; border: 3px solid #007bff; border-radius: 10px; display: none; margin-top: 20px; }
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
    </style>
</head>
<body>

    <div class="container">
        <h2>اختبار الوصول للكاميرا</h2>
        <p>اضغط لتشغيل الكاميرا الأمامية:</p>
        <button onclick="startCamera()">تشغيل الكاميرا</button>
        <video id="video" autoplay playsinline></video>
        <p id="status"></p>
    </div>

    <script>
        async function startCamera() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            try {
                // طلب الإذن للوصول للكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = "block";
                status.innerHTML = "تم الاتصال بالكاميرا بنجاح!";
            } catch (err) {
                status.innerHTML = "فشل الوصول للكاميرا (تم رفض الإذن).";
            }
        }
    </script>
</body>
</html>
