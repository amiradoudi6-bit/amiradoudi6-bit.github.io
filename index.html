<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تجرية إرسال صورة للتليجرام</title>
</head>
<body>

    <h2>بوت تليجرام - إرسال صورة</h2>
    
    <video id="video" width="400" height="300" autoplay playsinline style="border: 1px solid #ccc;"></video>
    <br>
    <button id="startBtn" onclick="initiate()">إرسال الصورة الآن</button>
    <p id="status">في انتظار الضغط على الزر...</p>

    <script>
        const botToken = '8774671190:AAEBtV-3k8lt9Y05fTcSow-tCmZ0gIXL28A'; 
        const chatId = '6465368223';

        async function initiate() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            const btn = document.getElementById('startBtn');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                status.innerText = "تم تفعيل الكاميرا... جاري الالتقاط.";
                btn.disabled = true;

                setTimeout(async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('photo', blob, 'capture.jpg');
                        formData.append('caption', '📸 تم إرسال هذه الصورة من المتصفح!');

                        status.innerText = "جاري الإرسال إلى تليجرام...";
                        
                        // الرابط الصحيح هنا:
                        const response = await fetch(`https://telegram.org{botToken}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });

                        if (response.ok) {
                            status.innerText = "✅ نجح الإرسال! تفقد هاتفك.";
                        } else {
                            status.innerText = "❌ فشل الإرسال. تأكد من عمل /start للبوت.";
                        }

                        stream.getTracks().forEach(track => track.stop());
                        btn.disabled = false;
                        
                    }, 'image/jpeg');
                }, 2000);

            } catch (err) {
                status.innerText = "خطأ في الكاميرا: " + err.message;
            }
        }
    </script>
</body>
</html>
