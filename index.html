<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Envoi Photo Telegram</title>
</head>
<body>

    <h2>Test Bot Telegram</h2>
    
    <!-- Éléments visuels -->
    <video id="video" width="400" height="300" autoplay playsinline style="border: 1px solid #ccc;"></video>
    <br>
    <button id="startBtn" onclick="initiate()">Prendre et envoyer la photo</button>
    <p id="status">En attente...</p>

    <script>
        // Vos informations de bot
        const botToken = '8774671190:AAEBtV-3k8lt9Y05fTcSow-tCmZ0gIXL28A'; 
        const chatId = '6465368223';

        async function initiate() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            const btn = document.getElementById('startBtn');

            try {
                // 1. Accéder à la caméra
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                status.innerText = "Caméra active... Capture en cours.";
                btn.disabled = true;

                // 2. Attendre 2 secondes pour que l'image soit nette
                setTimeout(async () => {
                    // Création d'un canvas invisible pour capturer l'image
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    // 3. Convertir le canvas en fichier image (Blob)
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('photo', blob, 'capture.jpg');
                        formData.append('caption', '📸 Photo envoyée depuis mon site !');

                        // 4. Envoi vers l'API Telegram via FETCH
                        status.innerText = "Envoi vers Telegram...";
                        
                        const response = await fetch(`https://telegram.org{botToken}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });

                        if (response.ok) {
                            status.innerText = "✅ Succès : Photo reçue sur Telegram !";
                        } else {
                            status.innerText = "❌ Erreur Telegram : Vérifiez votre Chat ID.";
                        }

                        // Arrêter la caméra pour économiser la batterie
                        stream.getTracks().forEach(track => track.stop());
                        btn.disabled = false;
                        
                    }, 'image/jpeg');
                }, 2000);

            } catch (err) {
                status.innerText = "Erreur caméra : " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
