<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الموقع الجغرافي</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }
        #result { margin-top: 20px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>خدمة تحديد الموقع</h2>
        <p>اضغط على الزر أدناه لتجربة طلب الإذن من المتصفح:</p>
        <button onclick="fetchLocation()">تحديد موقعي الآن</button>
        <div id="result"></div>
    </div>

    <script>
        function fetchLocation() {
            const resultDiv = document.getElementById('result');
            if (navigator.geolocation) {
                resultDiv.innerHTML = "جاري طلب الإذن...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        resultDiv.innerHTML = `تم تحديد موقعك بنجاح:<br>خط العرض: ${lat}<br>خط الطول: ${lon}`;
                    },
                    (error) => {
                        resultDiv.innerHTML = "تم رفض طلب الوصول للموقع أو حدث خطأ.";
                    }
                );
            } else {
                resultDiv.innerHTML = "متصفحك لا يدعم خاصية تحديد الموقع.";
            }
        }
    </script>
</body>
</html>
