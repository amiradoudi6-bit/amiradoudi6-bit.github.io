<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال إلى Amira_cam_bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #0088cc; margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }
        button:hover { background-color: #006699; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>تواصل مع Amira_cam_bot</h2>
    <form id="tgForm">
        <input type="text" id="userName" placeholder="اسمك (اختياري)">
        <textarea id="userMsg" rows="4" placeholder="اكتب رسالتك هنا..." required></textarea>
        <button type="submit" id="submitBtn">إرسال عبر تليجرام</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const botToken = "8774671190:AAEBtV-3k8lt9Y05fTcSow-tCmZ0gIXL28A";
    const chatId = "6465368223";

    document.getElementById('tgForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        const name = document.getElementById('userName').value || "زائر";
        const message = document.getElementById('userMsg').value;

        // تنسيق الرسالة التي ستصلك في تليجرام
        const fullText = `🔔 رسالة جديدة من الموقع:\n\n👤 الاسم: ${name}\n💬 الرسالة: ${message}`;

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";
        status.innerText = "";

        fetch(`https://telegram.org{botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                text: fullText,
                parse_mode: "HTML"
            })
        })
        .then(response => response.json())
        .then(res => {
            if(res.ok) {
                status.innerHTML = "<span style='color: green;'>✅ تم إرسال رسالتك بنجاح!</span>";
                document.getElementById('tgForm').reset();
            } else {
                status.innerHTML = "<span style='color: red;'>❌ خطأ: " + res.description + "</span>";
            }
        })
        .catch(err => {
            status.innerHTML = "<span style='color: red;'>❌ فشل الاتصال بالخادم.</span>";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "إرسال عبر تليجرام";
        });
    });
</script>

</body>
</html>
