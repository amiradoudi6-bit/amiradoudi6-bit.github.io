
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-whatsapp { background-color: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 10px; transition: 0.3s; }
        .btn-whatsapp:hover { background-color: #128c7e; }
        .btn-messenger { background-color: #0084ff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; text-decoration: none; display: block; transition: 0.3s; }
        .btn-messenger:hover { background-color: #0073e6; }
        .divider { margin: 20px 0; color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>أرسل رسالة مباشرة</h2>
    
    <input type="text" id="name" placeholder="الاسم الكامل">
    <textarea id="message" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>
    
    <button class="btn-whatsapp" onclick="sendWhatsApp()">إرسال عبر واتساب</button>
    
    <div class="divider">أو تواصل عبر</div>
    
    <!-- استبدل USERNAME باسم المستخدم الخاص بك في مسنجر -->
    <a href="https://m.me" target="_blank" class="btn-messenger">فتح ماسنجر</a>
</div>

<script>
    function sendWhatsApp() {
        const phoneNumber = "21629557942"; 
        
        const name = document.getElementById('name').value;
        const message = document.getElementById('message').value;

        if (!name || !message) {
            alert("يرجى ملء جميع الحقول");
            return;
        }

        const fullText = `مرحباً، أنا ${name}.%0Aالرسالة:%0A${message}`;
        const wpUrl = `https://wa.me{phoneNumber}?text=${fullText}`;

        // فتح الرابط في نافذة جديدة
        window.open(wpUrl, '_blank');
    }
</script>

</body>
</html>
